# GRPO RL Training Example

model: "./reverse-text-qwen3-2"
output_dir: ./outputs

per_device_train_batch_size: 1
sequence_len: 2048

# max_steps = orchestrator steps (must match orch.yaml max_steps)
max_steps: 20
logging_steps: 1

learning_rate: 1e-4
lr_scheduler_type: constant
warmup_steps: 0
max_grad_norm: 1.0
weight_decay: 0.01
optimizer: adamw

recipe: bf16

lora: true
lora_rank: 16
lora_alpha: 32
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

# Checkpointing
save_steps: 100
checkpoint_dir: ./outputs/checkpoints

