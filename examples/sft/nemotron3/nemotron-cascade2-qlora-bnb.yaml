model: nvidia/Nemotron-Cascade-2-30B-A3B
output_dir: ./output_nemo

gpus: 4
ep_size: 4

per_device_train_batch_size: 1
gradient_accumulation_steps: 4

sample_packing: true
sequence_len: 512

max_steps: 100
eval_steps: 25
learning_rate: 2e-4
warmup_ratio: 0.1

recipe: fp8-hybrid
lmhead_chunks: 8

lora: true
lora_rank: 16
lora_alpha: 32
lora_dtype: bf16

lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

qlora_bnb: true
qlora_offload_experts: true
zero_level: 2
offload_master: true
offload_grads: true
offload_optimizer: true
use_zero_copy: true

dataloader_num_workers: 4
datasets:
  - path: "OpenLLM-Ro/ro_gsm8k"
    type: auto
