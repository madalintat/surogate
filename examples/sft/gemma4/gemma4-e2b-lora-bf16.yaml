model: google/gemma-4-E2B-it
output_dir: ./output

per_device_train_batch_size: 1
gradient_accumulation_steps: 2

sample_packing: true
sequence_len: 1024

max_steps: 20
eval_steps: 0

learning_rate: 2e-4
warmup_ratio: 0.15

recipe: bf16
debug_memory_breakdown: false
use_cuda_graphs: false

lora: true
lora_rank: 16
lora_alpha: 32
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

dataloader_num_workers: 4
datasets:
  - path: "OpenLLM-Ro/ro_gsm8k"
    type: auto
