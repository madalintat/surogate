model: Qwen/Qwen3.6-35B-A3B-FP8
output_dir: ./output_35_moe

per_device_train_batch_size: 1
gradient_accumulation_steps: 4

gpus: 2
ep_size: 2
ep_load_balance_threshold: 1.0

sample_packing: true
sequence_len: 512

max_steps: 100
eval_steps: 25
learning_rate: 2e-4
warmup_ratio: 0.1

recipe: fp8-hybrid
lmhead_chunks: 8

lora: true
lora_rank: 16
lora_alpha: 32
lora_dtype: bf16

qlora_offload_experts: true

lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

dataloader_num_workers: 4
datasets:
  - path: "OpenLLM-Ro/ro_gsm8k"
    type: auto
