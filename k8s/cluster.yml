apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: ${CLUSTER_NAME}

servers: ${SERVERS}
agents: ${AGENTS}

kubeAPI:
  host: "k8s.localhost"
  hostIP: "0.0.0.0"
  hostPort: "${API_PORT}"

image: ${K3D_IMAGE}

volumes:
  - volume: ${LAKEFS_DIR}:/lakefs # volume in host:container
    nodeFilters:
    - server:0
    - agent:*
  - volume: ${HF_CACHE}:/hf-cache # volume in host:container
    nodeFilters:
    - server:0
    - agent:*

ports:
  - port: ${HTTP_PORT}:80 # http port host:container
    nodeFilters:
      - loadbalancer
  - port: 0.0.0.0:${HTTPS_PORT}:443 # https port host:container
    nodeFilters:
      - loadbalancer

hostAliases:
  - ip: 127.0.0.1
    hostnames:
      - k8s.localhost
      - studio.k8s.localhost

options:
  k3d:
    wait: true
    timeout: "60s"
    loadbalancer:
      configOverrides:
      - settings.workerConnections=2048
  k3s:
    extraArgs:
    - arg: --disable=traefik
      nodeFilters:
      - server:*
    - arg: --tls-san=localhost,127.0.0.1,k8s.localhost,cluster.localhost,k8s.localhost,studio.k8s.localhost,lakefs.k8s.localhost,lakefs-s3.k8s.localhost,metrics.k8s.localhost
      nodeFilters:
      - server:*
    - arg: --kube-proxy-arg=metrics-bind-address=0.0.0.0
      nodeFilters:
      - server:*
      - agent:*
    - arg: --kube-scheduler-arg=bind-address=0.0.0.0
      nodeFilters:
      - server:*
    - arg: --kubelet-arg=node-status-update-frequency=4s
      nodeFilters:
      - server:*
    - arg: --node-taint=node-role.kubernetes.io/control-plane:NoSchedule
      nodeFilters:
      - server:*
  kubeconfig:
    updateDefaultKubeconfig: true
    switchCurrentContext: true
